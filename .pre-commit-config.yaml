fail_fast: false

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args: [ --fix ]

      - id: ruff-format

  - repo: https://github.com/facebook/pyrefly-pre-commit
    rev: 1.2.0.dev1
    hooks:
      - id: pyrefly-check
        name: Pyrefly (type checking)
        pass_filenames: false
